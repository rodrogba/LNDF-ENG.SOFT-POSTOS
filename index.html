<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LNDF ENG. SOFTWARE</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        body { 
            background-color: #050505; 
            color: #cbd5e1; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
        }
        .glass-panel {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #map { width: 100%; height: 100%; background: #050505; }
        .dark-map-tiles { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }
        .custom-div-icon { background: none !important; border: none !important; }
        .price-badge-glow { box-shadow: 0 0 20px rgba(34, 197, 94, 0.3); }
        
        .star-rating {
            display: flex;
            gap: 4px;
        }
        .star-btn {
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        .star-btn:hover { transform: scale(1.2); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        const Icon = ({ name, size = 18, className = "", color = "currentColor" }) => {
            return <i data-lucide={name} className={className} style={{ width: size, height: size, strokeWidth: 2, stroke: color }}></i>;
        };

        /**
         * BASE DE DADOS ATUALIZADA - VALORES REAIS DE SÃO LUÍS (MARÇO/2024)
         */
        const INITIAL_STATIONS = [
            // ZONA PONTA D'AREIA / SÃO FRANCISCO
            { id: 1, name: "Posto Shell - Ponta d'Areia", brand: "Shell", prices: { gasolina: 5.99, etanol: 3.99, diesel: 6.10 }, address: "Av. dos Holandeses, Ponta d'Areia", lat: -2.4868, lng: -44.3015, rating: 4.5, reviews: 128 },
            { id: 6, name: "Posto São Francisco (Shell)", brand: "Shell", prices: { gasolina: 5.92, etanol: 3.85, diesel: 6.15 }, address: "Av. Castelo Branco, São Francisco", lat: -2.5015, lng: -44.3035, rating: 4.1, reviews: 76 },
            
            // CALHAU / LITORÂNEA
            { id: 2, name: "Posto Ipiranga - Litorânea", brand: "Ipiranga", prices: { gasolina: 5.85, etanol: 3.79, diesel: 5.95 }, address: "Av. Litorânea, Calhau", lat: -2.4842, lng: -44.2758, rating: 4.8, reviews: 256 },
            { id: 11, name: "Posto BR - Calhau", brand: "Petrobras", prices: { gasolina: 5.99, etanol: 4.10, diesel: 6.20 }, address: "Av. dos Holandeses, Calhau", lat: -2.4910, lng: -44.2700, rating: 4.3, reviews: 142 },

            // RENASCENÇA
            { id: 3, name: "Posto BR - Renascença", brand: "Petrobras", prices: { gasolina: 6.15, etanol: 4.19, diesel: 6.25 }, address: "Av. Colares Moreira, Renascença II", lat: -2.5034, lng: -44.2945, rating: 4.2, reviews: 89 },
            { id: 12, name: "Posto Shell - Shopping Island", brand: "Shell", prices: { gasolina: 6.10, etanol: 4.15, diesel: 6.18 }, address: "Av. Cel. Colares Moreira, Renascença", lat: -2.4980, lng: -44.2950, rating: 4.0, reviews: 110 },

            // COHAMA / DANIEL DE LA TOUCHE
            { id: 5, name: "Posto Cohama - Daniel de La Touche", brand: "Petrobras", prices: { gasolina: 6.12, etanol: 4.10, diesel: 6.40 }, address: "Av. Daniel de La Touche, Cohama", lat: -2.5255, lng: -44.2542, rating: 4.0, reviews: 156 },
            { id: 13, name: "Posto Ipiranga - Aririzal", brand: "Ipiranga", prices: { gasolina: 5.79, etanol: 3.75, diesel: 6.05 }, address: "Rua do Aririzal, Cohama", lat: -2.5310, lng: -44.2480, rating: 4.4, reviews: 310 },
            
            // TURU / SÃO LUÍS REI DE FRANÇA
            { id: 8, name: "Posto Turu - São Luís Rei de França", brand: "Petrobras", prices: { gasolina: 5.49, etanol: 3.55, diesel: 5.88 }, address: "Av. São Luís Rei de França, Turu", lat: -2.5088, lng: -44.2335, rating: 4.4, reviews: 189 },
            { id: 15, name: "Posto Ale - Cohatrac", brand: "ALE", prices: { gasolina: 5.52, etanol: 3.49, diesel: 5.80 }, address: "Av. Contorno Sul, Cohatrac IV", lat: -2.5350, lng: -44.2150, rating: 4.1, reviews: 205 },
            { id: 7, name: "Posto Cohab - Jerônimo de Albuquerque", brand: "Ipiranga", prices: { gasolina: 5.65, etanol: 3.60, diesel: 5.90 }, address: "Av. Jerônimo de Albuquerque, Cohab", lat: -2.5205, lng: -44.2380, rating: 4.3, reviews: 210 },

            // CIDADE OPERÁRIA / FORQUILHA
            { id: 4, name: "Posto Cidade Operária (Indep)", brand: "Independente", prices: { gasolina: 5.42, etanol: 3.39, diesel: 5.85 }, address: "Av. Principal, Cidade Operária", lat: -2.5795, lng: -44.2185, rating: 3.9, reviews: 342 },
            { id: 10, name: "Posto Forquilha (Estrada Ribamar)", brand: "Independente", prices: { gasolina: 5.39, etanol: 3.35, diesel: 5.75 }, address: "Estrada de Ribamar, Forquilha", lat: -2.5455, lng: -44.2105, rating: 3.5, reviews: 520 },
            { id: 23, name: "Posto Petrobras - Forquilha", brand: "Petrobras", prices: { gasolina: 5.45, etanol: 3.40, diesel: 5.82 }, address: "Av. Jerônimo de Albuquerque, Forquilha", lat: -2.5410, lng: -44.2150, rating: 4.0, reviews: 92 },

            // GUAJAJARAS / SÃO CRISTÓVÃO
            { id: 22, name: "Posto Shell - Aeroporto", brand: "Shell", prices: { gasolina: 5.95, etanol: 3.90, diesel: 6.20 }, address: "Av. Guajajaras, São Cristóvão", lat: -2.5780, lng: -44.2320, rating: 4.3, reviews: 154 },
            { id: 24, name: "Posto Ipiranga - Guajajaras", brand: "Ipiranga", prices: { gasolina: 5.59, etanol: 3.55, diesel: 5.95 }, address: "Av. Guajajaras, Tirirical", lat: -2.5690, lng: -44.2350, rating: 4.1, reviews: 112 },

            // BR-135
            { id: 20, name: "Posto Petrobras - BR-135", brand: "Petrobras", prices: { gasolina: 5.35, etanol: 3.29, diesel: 5.65 }, address: "BR-135, Km 2, Tirirical", lat: -2.5720, lng: -44.2420, rating: 3.7, reviews: 410 },
            { id: 21, name: "Posto Maracanã (Indep)", brand: "Independente", prices: { gasolina: 5.32, etanol: 3.25, diesel: 5.60 }, address: "BR-135, Maracanã", lat: -2.6250, lng: -44.2850, rating: 3.4, reviews: 290 },
            
            // ITAQUI-BACANGA
            { id: 18, name: "Posto Ipiranga - Anjo da Guarda", brand: "Ipiranga", prices: { gasolina: 5.75, etanol: 3.65, diesel: 6.05 }, address: "Av. dos Portugueses, Anjo da Guarda", lat: -2.5650, lng: -44.3100, rating: 4.0, reviews: 198 },
            { id: 19, name: "Posto BR - UFMA", brand: "Petrobras", prices: { gasolina: 5.82, etanol: 3.68, diesel: 6.10 }, address: "Av. dos Portugueses, Itaqui-Bacanga", lat: -2.5520, lng: -44.3050, rating: 4.1, reviews: 167 }
        ];

        const MapView = ({ stations, onSelect, selectedId, fuelType, lowestPrice }) => {
            const mapRef = useRef(null);
            const markersRef = useRef({});

            useEffect(() => {
                if (!mapRef.current) {
                    mapRef.current = L.map('map', { zoomControl: false }).setView([-2.5300, -44.2600], 12);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { 
                        className: 'dark-map-tiles',
                        attribution: '&copy; OpenStreetMap'
                    }).addTo(mapRef.current);
                }
                
                Object.values(markersRef.current).forEach(m => m.remove());
                markersRef.current = {};

                stations.forEach(station => {
                    const isSelected = selectedId === station.id;
                    const isLowest = station.prices[fuelType] === lowestPrice;
                    const markerIcon = L.divIcon({
                        className: 'custom-div-icon',
                        html: `
                            <div style="display: flex; flex-direction: column; align-items: center;">
                                <div style="background-color: ${isSelected ? '#ef4444' : (isLowest ? '#22c55e' : '#000')};
                                    border: 2px solid ${isSelected ? '#fff' : (isLowest ? '#fff' : '#ef4444')};
                                    width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
                                    transform: rotate(45deg); box-shadow: 0 4px 10px rgba(0,0,0,0.5); border-radius: 4px;">
                                    <div style="transform: rotate(-45deg); color: white; font-size: 14px; font-weight: bold;">⛽</div>
                                </div>
                                <div style="margin-top: 4px; background: ${isLowest ? '#22c55e' : 'rgba(0,0,0,0.8)'}; 
                                     padding: 2px 6px; border-radius: 4px; font-size: 10px; color: ${isLowest ? '#000' : 'white'}; 
                                     font-weight: 800; white-space: nowrap; border: 1px solid #333;">
                                     R$ ${station.prices[fuelType].toFixed(2)}
                                </div>
                            </div>`,
                        iconSize: [32, 55], iconAnchor: [16, 40]
                    });
                    const marker = L.marker([station.lat, station.lng], { icon: markerIcon })
                        .addTo(mapRef.current)
                        .on('click', () => { onSelect(station); mapRef.current.setView([station.lat, station.lng], 15); });
                    markersRef.current[station.id] = marker;
                });
            }, [stations, selectedId, fuelType, lowestPrice]);

            return <div id="map"></div>;
        };

        const FeedbackModal = ({ station, onClose }) => {
            const [rating, setRating] = useState(0);
            const [submitted, setSubmitted] = useState(false);

            const handleSubmit = (e) => {
                e.preventDefault();
                setSubmitted(true);
                setTimeout(onClose, 2000);
            };

            if (submitted) {
                return (
                    <div className="fixed inset-0 z-[2000] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
                        <div className="bg-[#0a0a0a] border border-green-500 p-10 text-center max-w-sm w-full">
                            <Icon name="check-circle" size={48} className="text-green-500 mx-auto mb-4" />
                            <h2 className="text-xl font-bold text-white uppercase tracking-widest">Obrigado!</h2>
                            <p className="text-zinc-500 text-xs mt-2 uppercase tracking-widest">Sua confirmação de preço foi enviada.</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="fixed inset-0 z-[2000] flex items-center justify-center p-4 bg-black/90 backdrop-blur-md overflow-y-auto">
                    <div className="bg-[#0a0a0a] border border-zinc-800 w-full max-w-lg p-8 relative">
                        <button onClick={onClose} className="absolute top-4 right-4 text-zinc-500 hover:text-white">
                            <Icon name="x" size={24} />
                        </button>

                        <div className="mb-8">
                            <span className="text-[9px] font-black text-green-500 uppercase tracking-[0.4em]">Atualizar Informação</span>
                            <h2 className="text-2xl font-bold text-white uppercase tracking-tighter mt-1">{station.name}</h2>
                        </div>

                        <form onSubmit={handleSubmit} className="space-y-6">
                            <div>
                                <label className="text-[10px] font-black uppercase tracking-widest text-zinc-500 mb-3 block">Qualidade do Combustível</label>
                                <div className="star-rating">
                                    {[1, 2, 3, 4, 5].map(star => (
                                        <button key={star} type="button" onClick={() => setRating(star)} className="star-btn">
                                            <Icon name="star" size={32} className={star <= rating ? "fill-green-500 text-green-500" : "text-zinc-800"} />
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div className="p-4 bg-zinc-900 border border-zinc-800">
                                    <label className="text-[8px] font-black uppercase text-zinc-500 block mb-2">Preço na Bomba AGORA</label>
                                    <div className="flex items-center gap-2">
                                        <span className="text-xs text-zinc-400">R$</span>
                                        <input type="number" step="0.01" placeholder="Ex: 5.49" className="w-full bg-black border border-zinc-700 text-xs p-2 text-white outline-none" required />
                                    </div>
                                </div>
                                <div className="p-4 bg-zinc-900 border border-zinc-800">
                                    <label className="text-[8px] font-black uppercase text-zinc-500 block mb-2">Forma de Pagamento</label>
                                    <select className="w-full bg-black border border-zinc-700 text-[10px] p-2 text-white outline-none">
                                        <option>Dinheiro / PIX</option>
                                        <option>Cartão de Débito</option>
                                        <option>Cartão de Crédito</option>
                                        <option>App Próprio do Posto</option>
                                    </select>
                                </div>
                            </div>

                            <button type="submit" className="w-full py-4 text-[10px] font-black uppercase tracking-[0.3em] transition-all border bg-green-700 border-green-500 text-white hover:bg-green-600 shadow-lg">
                                Confirmar Preço Atual
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [searchTerm, setSearchTerm] = useState("");
            const [fuelType, setFuelType] = useState("gasolina");
            const [viewMode, setViewMode] = useState("list");
            const [selectedStation, setSelectedStation] = useState(null);
            const [feedbackStation, setFeedbackStation] = useState(null);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [viewMode, selectedStation, fuelType, searchTerm, feedbackStation]);

            const lowestPrice = useMemo(() => Math.min(...INITIAL_STATIONS.map(s => s.prices[fuelType])), [fuelType]);

            const filteredStations = useMemo(() => {
                return INITIAL_STATIONS
                    .filter(s => s.name.toLowerCase().includes(searchTerm.toLowerCase()) || s.address.toLowerCase().includes(searchTerm.toLowerCase()))
                    .sort((a, b) => a.prices[fuelType] - b.prices[fuelType]);
            }, [searchTerm, fuelType]);

            return (
                <div className="min-h-screen bg-[#050505] text-slate-300 pb-24 selection:bg-green-900">
                    {feedbackStation && <FeedbackModal station={feedbackStation} onClose={() => setFeedbackStation(null)} />}

                    <header className="bg-[#0a0a0a] border-b border-zinc-900 p-6 sticky top-0 z-30 shadow-2xl backdrop-blur-md">
                        <div className="max-w-5xl mx-auto">
                            <div className="flex items-center justify-between mb-8">
                                <div className="flex items-center gap-4">
                                    <div className="p-2.5 bg-green-950/20 border border-green-700/50 rounded flex items-center justify-center">
                                        <Icon name="zap" className="text-green-500" size={22} />
                                    </div>
                                    <div>
                                        <h1 className="text-xl font-bold tracking-widest uppercase text-white">LNDF <span className="text-green-500 font-light">ENG. SOFTWARE</span></h1>
                                        <p className="text-[9px] text-zinc-500 font-bold uppercase tracking-[0.3em]">Preços Reais Atualizados</p>
                                    </div>
                                </div>
                                <div className="hidden md:block text-right">
                                    <span className="text-[10px] font-black text-zinc-600 uppercase tracking-widest block">Menor Preço Hoje</span>
                                    <span className="text-xl font-light text-green-500">R$ {lowestPrice.toFixed(2)}</span>
                                </div>
                            </div>

                            <div className="relative mb-6">
                                <Icon name="search" className="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-600" size={18} />
                                <input type="text" placeholder="PROCURAR POR BAIRRO OU NOME DO POSTO..." className="w-full pl-12 pr-4 py-4 bg-[#0d0d0d] border border-zinc-800 text-sm text-zinc-100 placeholder:text-zinc-700 focus:outline-none focus:border-green-800 transition-all uppercase tracking-widest"
                                    value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                            </div>

                            <div className="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                                {["gasolina", "etanol", "diesel"].map(type => (
                                    <button key={type} onClick={() => setFuelType(type)} className={`px-8 py-3 text-[10px] font-bold uppercase tracking-[0.3em] transition-all border ${fuelType === type ? 'bg-green-800 border-green-500 text-white' : 'bg-black border-zinc-800 text-zinc-500 hover:text-zinc-300'}`}>
                                        {type}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto p-4 md:p-8">
                        <div className="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
                            <div className="flex bg-black border border-zinc-800 p-1 w-full md:w-auto">
                                <button onClick={() => setViewMode("list")} className={`flex-1 md:flex-none px-6 py-2.5 text-[10px] font-bold uppercase tracking-widest transition-all ${viewMode === 'list' ? 'bg-zinc-900 text-green-500' : 'text-zinc-600'}`}>RANKING DE PREÇO</button>
                                <button onClick={() => setViewMode("map")} className={`flex-1 md:flex-none px-6 py-2.5 text-[10px] font-bold uppercase tracking-widest transition-all ${viewMode === 'map' ? 'bg-zinc-900 text-green-500' : 'text-zinc-600'}`}>MAPA INTERATIVO</button>
                            </div>
                        </div>

                        {viewMode === "list" ? (
                            <div className="grid gap-4">
                                {filteredStations.length > 0 ? filteredStations.map((station, index) => {
                                    const isLowest = station.prices[fuelType] === lowestPrice;
                                    return (
                                        <div key={station.id} className={`bg-[#0a0a0a] border ${isLowest ? 'border-green-500/50 price-badge-glow' : 'border-zinc-900'} p-6 transition-all flex flex-col md:flex-row gap-6 relative group`}>
                                            <div className="flex-1 text-center md:text-left">
                                                <div className="flex flex-col md:flex-row md:items-center gap-2 mb-1">
                                                    <h3 className="text-lg font-bold text-white uppercase tracking-tighter">{station.name}</h3>
                                                    {isLowest && <span className="bg-green-950 text-green-400 text-[8px] px-2 py-1 font-black uppercase border border-green-800 w-fit mx-auto md:mx-0">Melhor Opção</span>}
                                                </div>
                                                <p className="text-[10px] text-zinc-500 font-bold uppercase">{station.address}</p>
                                                
                                                <div className="mt-6 flex flex-wrap justify-center md:justify-start gap-3">
                                                    <button onClick={() => window.open(`https://www.google.com/maps/dir/?api=1&destination=${station.lat},${station.lng}`)} className="text-[9px] font-black uppercase tracking-widest bg-zinc-900 px-6 py-3 border border-zinc-800 hover:border-green-800 transition-all flex items-center gap-2">
                                                        <Icon name="navigation" size={12}/> Traçar Rota
                                                    </button>
                                                    <button onClick={() => setFeedbackStation(station)} className="text-[9px] font-black uppercase tracking-widest bg-black px-6 py-3 border border-zinc-800 hover:border-green-500 text-green-500 transition-all flex items-center gap-2">
                                                        <Icon name="edit-3" size={12}/> Atualizar Valor
                                                    </button>
                                                </div>
                                            </div>

                                            <div className={`w-full md:w-44 p-6 text-center border-l border-zinc-900 ${isLowest ? 'bg-green-950/10' : ''}`}>
                                                <span className={`text-[9px] uppercase font-black ${isLowest ? 'text-green-500' : 'text-zinc-600'}`}>Valor {fuelType}</span>
                                                <div className={`text-3xl font-light mt-1 ${isLowest ? 'text-green-500' : 'text-white'}`}>R$ {station.prices[fuelType].toFixed(2).replace('.', ',')}</div>
                                                <div className="text-[8px] font-bold text-zinc-600 mt-2 uppercase">Verificado hoje</div>
                                            </div>
                                        </div>
                                    );
                                }) : (
                                    <div className="py-20 text-center border border-zinc-900 border-dashed">
                                        <Icon name="search-x" size={48} className="mx-auto text-zinc-800 mb-4" />
                                        <p className="text-zinc-600 font-bold uppercase tracking-widest text-xs">Nenhum resultado para "{searchTerm}"</p>
                                    </div>
                                )}
                            </div>
                        ) : (
                            <div className="relative w-full aspect-square md:aspect-[16/9] bg-[#020202] border border-zinc-800 overflow-hidden shadow-2xl">
                                <MapView stations={filteredStations} onSelect={setSelectedStation} selectedId={selectedStation?.id} fuelType={fuelType} lowestPrice={lowestPrice} />
                                {selectedStation && (
                                    <div className="absolute bottom-4 left-4 right-4 glass-panel p-6 z-[1000] flex flex-col md:flex-row items-center justify-between animate-in slide-in-from-bottom-2">
                                        <div className="flex-1 w-full text-center md:text-left">
                                            <h4 className="font-bold text-white text-lg uppercase mb-1">{selectedStation.name}</h4>
                                            <p className="text-zinc-500 text-[10px] uppercase truncate">{selectedStation.address}</p>
                                        </div>
                                        <div className="flex items-center gap-4 mt-6 md:mt-0 w-full md:w-auto justify-between">
                                            <div className="text-right flex-1 md:flex-none md:mr-6">
                                                <p className="text-[9px] font-black text-zinc-600 uppercase">Preço {fuelType}</p>
                                                <p className="text-xl text-green-500 font-bold">R$ {selectedStation.prices[fuelType].toFixed(2)}</p>
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => window.open(`https://www.google.com/maps/dir/?api=1&destination=${selectedStation.lat},${selectedStation.lng}`)} className="bg-green-700 p-3 text-white shadow-lg"><Icon name="navigation" size={20}/></button>
                                                <button onClick={() => setSelectedStation(null)} className="p-3 text-zinc-700 hover:text-white"><Icon name="x" size={20}/></button>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    <footer className="fixed bottom-0 left-0 right-0 glass-panel border-t border-zinc-900 p-6 z-50 flex justify-around items-center">
                        <button className={`flex flex-col items-center gap-1 transition-colors ${viewMode === 'list' ? 'text-green-500' : 'text-zinc-700'}`} onClick={() => setViewMode("list")}>
                            <Icon name="list" size={20}/><span className="text-[8px] font-black uppercase">Economia</span>
                        </button>
                        <div className="h-14 w-14 bg-green-800 text-white rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(34,197,94,0.4)] -top-6 relative border-4 border-[#050505]">
                            <Icon name="fuel" size={24}/>
                        </div>
                        <button className={`flex flex-col items-center gap-1 transition-colors ${viewMode === 'map' ? 'text-green-500' : 'text-zinc-700'}`} onClick={() => setViewMode("map")}>
                            <Icon name="map" size={20}/><span className="text-[8px] font-black uppercase">Mapa</span>
                        </button>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
